name: Build & Deploy

on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build-and-deploy:
    name: Build Image & Deploy to Server
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.app
          platforms: linux/amd64
          push: false
          load: true
          tags: requestly-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as tar
        run: docker save -o requestly-app-linux-amd64.tar requestly-app:latest

      - name: Verify and fix artifact permissions
        run: |
          set -e
          ls -lah
          stat requestly-app-linux-amd64.tar
          stat docker-compose.yml
          sudo chown "$USER:$USER" requestly-app-linux-amd64.tar docker-compose.yml
          chmod 644 requestly-app-linux-amd64.tar docker-compose.yml
          test -r requestly-app-linux-amd64.tar
          test -r docker-compose.yml

      - name: Upload tar & docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: "./requestly-app-linux-amd64.tar,./docker-compose.yml"
          target: /requestly
          debug: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd /requestly
            docker load -i requestly-app-linux-amd64.tar
            docker compose down
            docker compose up -d --force-recreate app
            docker compose ps
            rm -f requestly-app-linux-amd64.tar
